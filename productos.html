<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Productos — Paladear (PRUEBA de diseño)</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#547692" />
<link rel="icon" href="https://paladear.github.io/paladeartienda/favicon-32x32.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --azul:#547692; --azul-dark:#3d5a72; --azul-mid:#6d90aa; --azul-light:#cfdce8;
  --terra:#b87040; --bg:#f6f8fa; --card:#ffffff; --fg:#26333c; --muted-fg:#5f7180;
  --border:#dde5ec; --wsp:#25D366;
  --font:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--fg);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:calc(64px + env(safe-area-inset-bottom))}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.wrap{max-width:1000px;margin:0 auto;padding-left:16px;padding-right:16px}

/* ── header compacto azul ── */
.phead{background:linear-gradient(120deg,#3f5e7a 0%,#547692 60%,#6989a8 100%);padding:10px 0}
.phead-in{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:0 16px}
.phead-logo{height:46px;width:auto;border-radius:50%;background:#fff;padding:2px;box-shadow:0 4px 9px rgba(12,30,48,.4);cursor:pointer;flex-shrink:0}
.phead-title{color:#fff;font-weight:800;font-size:17px;flex:1}
.phead-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.5);color:#fff;display:grid;place-items:center;flex-shrink:0}
.phead-btn svg{width:18px;height:18px}

/* ── pills ── */
.tabs-zone{background:var(--azul);overflow:hidden}
.may-tabs-wrap{display:flex;margin:0 auto;max-width:1000px;padding:0 16px}
.may-tab{cursor:pointer;padding:8px 12px 14px;font-weight:700;font-size:14px;border:none;background:transparent;color:rgba(255,255,255,.78);flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;line-height:1.1}
.may-tab-icon{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 2px 2.5px rgba(0,0,0,.22))}
.may-tab-emoji{font-size:25px;line-height:30px;height:30px;filter:drop-shadow(0 2px 2.5px rgba(0,0,0,.22))}
.may-tab.active{color:var(--azul-dark);background:var(--bg);border-radius:20px 20px 0 0}

/* ── toolbar sticky: buscador + rubro ── */
.toolbar{position:sticky;top:0;z-index:100;background:var(--bg);padding:12px 0 10px;box-shadow:0 4px 14px rgba(61,90,114,.06)}
.toolbar-in{max-width:1000px;margin:0 auto;padding:0 16px;display:flex;gap:8px}
.tb-search{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:999px;padding:0 14px;height:44px}
.tb-search svg{width:17px;height:17px;color:var(--muted-fg);flex-shrink:0}
.tb-search input{border:none;outline:none;flex:1;font-size:16px;font-family:inherit;background:none;min-width:0;color:var(--fg)}
.tb-rubro{display:flex;align-items:center;gap:6px;background:var(--azul-dark);color:#fff;border-radius:999px;height:44px;padding:0 14px;font-size:13px;font-weight:700;white-space:nowrap;max-width:46vw}
.tb-rubro .em{font-size:16px}
.tb-rubro .lbl{overflow:hidden;text-overflow:ellipsis}
.tb-rubro svg{width:14px;height:14px;flex-shrink:0}

/* ── lista de productos ── */
.plist{padding-top:14px}
.letter-row{display:flex;align-items:center;gap:10px;margin:16px 0 9px}
.letter-row b{width:30px;height:30px;border-radius:9px;background:var(--azul-light);color:var(--azul-dark);display:grid;place-items:center;font-size:14px;font-weight:800}
.letter-row i{flex:1;height:1.5px;background:var(--border);border-radius:1px}
.pgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
@media(min-width:700px){.pgrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(min-width:960px){.pgrid{grid-template-columns:repeat(4,minmax(0,1fr))}}
.pc{background:#fff;border:1.5px solid var(--border);border-radius:15px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.pc:hover{box-shadow:0 8px 24px rgba(61,90,114,.13);transform:translateY(-2px)}
.pc-imgw{position:relative;background:#fff;height:140px}
.pc-imgw img{width:100%;height:100%;object-fit:contain;padding:8px}
.pc-fav{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;background:#fff;border:1.5px solid var(--border);display:grid;place-items:center;color:#b8c4cd;z-index:2;transition:color .15s,transform .15s}
.pc-fav svg{width:18px;height:18px}
.pc-fav.on{color:#e8633a}
.pc-fav.on svg{fill:#e8633a;stroke:#e8633a}
.pc-fav:active{transform:scale(.88)}
.pc-body{padding:10px 12px 12px;display:flex;flex-direction:column;flex:1}
.pc-rubro{align-self:flex-start;font-size:10px;font-weight:800;letter-spacing:.03em;background:var(--azul-light);color:var(--azul-dark);border-radius:999px;padding:2.5px 9px;margin-bottom:6px}
.pc-name{font-size:13px;font-weight:700;color:var(--fg);line-height:1.25;min-height:33px}
.pc-price{font-size:16px;font-weight:800;color:var(--azul-dark);margin:7px 0 9px}
.pc-add{margin-top:auto;background:var(--azul);color:#fff;border-radius:9px;padding:10px;font-size:13px;font-weight:700;transition:background .2s}
.pc-add:hover{background:var(--azul-dark)}
.p-empty{text-align:center;color:var(--muted-fg);font-size:13.5px;padding:40px 20px;line-height:1.5}

/* ── bottom-sheet de rubros ── */
.sheet-ov{position:fixed;inset:0;background:rgba(38,51,60,.5);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-ov.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:401;background:#fff;border-radius:20px 20px 0 0;transform:translateY(105%);transition:transform .3s cubic-bezier(.22,1,.36,1);max-height:78vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.25)}
.sheet.on{transform:none}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px}
.sheet-head b{font-size:16px;font-weight:800;color:var(--azul-dark)}
.sheet-x{width:34px;height:34px;border-radius:50%;background:var(--bg);color:var(--muted-fg);display:grid;place-items:center}
.sheet-x svg{width:16px;height:16px}
.sheet-grid{overflow-y:auto;padding:4px 14px calc(20px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sh-r{display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 4px;text-align:center;transition:border-color .15s,background .15s}
.sh-r .em{font-size:23px}
.sh-r span{font-size:10.5px;font-weight:700;color:var(--fg);line-height:1.15}
.sh-r.act{border-color:var(--azul);background:var(--azul-light)}
@media(min-width:700px){.sheet{left:50%;right:auto;transform:translate(-50%,105%);width:560px;border-radius:20px;bottom:24px}.sheet.on{transform:translate(-50%,0)}.sheet-grid{grid-template-columns:repeat(4,1fr)}}

/* ── bottom nav ── */
.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:200;display:flex;background:#fff;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(61,90,114,.08)}
.bottom-nav a{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 8px;color:var(--muted-fg);font-size:10px;font-weight:600}
.bottom-nav a svg{width:22px;height:22px;color:var(--azul)}
.bottom-nav a.active{color:var(--terra);font-weight:700}
.bottom-nav a.active svg{color:var(--terra)}
@media(min-width:768px){.bottom-nav{display:none}body{padding-bottom:0}}
</style>
</head>
<body>

<!-- header compacto -->
<div class="phead">
  <div class="phead-in">
    <img class="phead-logo" src="https://paladear.github.io/paladeartienda/android-chrome-512x512.png" alt="Paladear" onclick="location.href='index.html'">
    <span class="phead-title">Productos</span>
    <a class="phead-btn" href="https://wa.me/5492616512823" target="_blank" rel="noopener" aria-label="WhatsApp"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 0 1 8.413 3.488 11.824 11.824 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24z"/></svg></a>
    <button class="phead-btn" aria-label="Mi cuenta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.6 3.2-5.6 7-5.6s7 2 7 5.6"/></svg></button>
  </div>
</div>

<!-- pills -->
<div class="tabs-zone">
  <div class="may-tabs-wrap">
    <button class="may-tab" onclick="location.href='index.html'"><span class="may-tab-emoji">🏠</span><span>Home</span></button>
    <button class="may-tab active"><img class="may-tab-icon" src="https://paladear.github.io/paladeartienda/icon-minorista.png" alt=""><span>Productos</span></button>
    <button class="may-tab"><img class="may-tab-icon" src="https://paladear.github.io/paladeartienda/icon-inspiracion.png" alt=""><span>Inspiración</span></button>
  </div>
</div>

<!-- toolbar sticky -->
<div class="toolbar">
  <div class="toolbar-in">
    <label class="tb-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input id="q" type="search" placeholder="Buscar productos..." oninput="render()"></label>
    <button class="tb-rubro" id="rubroBtn" onclick="openSheet()"><span class="em" id="rubroEm">🧺</span><span class="lbl" id="rubroLbl">Todos</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
  </div>
</div>

<main class="wrap plist">
  <div id="lista"></div>
</main>

<!-- bottom-sheet rubros -->
<div class="sheet-ov" id="sheetOv" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-label="Elegir rubro">
  <div class="sheet-head"><b>Elegí un rubro</b><button class="sheet-x" onclick="closeSheet()" aria-label="Cerrar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M5 5l14 14M19 5 5 19"/></svg></button></div>
  <div class="sheet-grid" id="sheetGrid"></div>
</div>

<!-- bottom nav -->
<nav class="bottom-nav" aria-label="Navegación inferior">
  <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg><span>Inicio</span></a>
  <a href="productos.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Productos</span></a>
  <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12l-8 8-9-9V4h7z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg><span>Ofertas</span></a>
  <a href="productos.html?fav=1" id="navFav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 5.6a5.4 5.4 0 0 0-7.7 0L12 6.7l-1.1-1.1a5.4 5.4 0 1 0-7.7 7.7L12 22l8.8-8.7a5.4 5.4 0 0 0 0-7.7z"/></svg><span>Favoritos</span></a>
  <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg><span>Cuenta</span></a>
  <a href="https://wa.me/5492616512823" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 0 1 8.413 3.488 11.824 11.824 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24z"/></svg><span>WhatsApp</span></a>
</nav>

<script>
// ── Rubros (los mismos emojis de la página oficial) ──
var RUBROS=[
  ['frutos','Frutos Secos','🥜'],['deshidratados','Deshidratados','🍇'],['semillas','Semillas','🌻'],
  ['especias','Especias','🌿'],['infusiones','Infusiones y Hierbas','🍵'],['cereales','Cereales','🥣'],
  ['granos','Granos y Legumbres','🫘'],['harinas','Harinas','🌾'],['sintacc','Sin TACC','🌱'],
  ['dulces','Dulces, Miel y Chocolates','🍯'],['reposteria','Azúcar, Cacao y Repostería','🍫'],['mantecas','Mantecas y Pastas','🧈'],
  ['aceites','Aceites y Vinagres','🫙'],['aceitunas','Aceitunas','🫒'],['encurtidos','Encurtidos','🥒'],
  ['tomate','Tomate','🍅'],['snack','Snacks','🍿'],['suplementos','Suplementos','💊'],
  ['gourmet','Línea Gourmet','⭐'],['bebidas','Bebidas','🥤'],['vinos','Vinos y Licores','🍷'],
  ['frio','Productos de Frío','❄️'],['congelados','Congelados','🧊'],['home','Paladear Home','🏠']
];
// ── Muestra de productos reales (fotos de Cloudinary; precios de ejemplo) ──
var CLOUD='https://res.cloudinary.com/hswu4zpv/image/upload/f_auto,q_auto,w_400/';
var PRODS=[
  {id:1024,n:'Aceitunas Griegas x 1 Kg',r:'aceitunas',p:16150},
  {id:1025,n:'Aceitunas Griegas x ½ Kg',r:'aceitunas',p:11180},
  {id:1036,n:'Aceitunas Rellenas x 200 Gr',r:'aceitunas',p:5710},
  {id:1043,n:'Aceitunas Verdes Nº 00 x 1 Kg',r:'aceitunas',p:14320},
  {id:1068,n:'Adobo para Pizza x 100 Gr',r:'especias',p:3200},
  {id:1842,n:'Almendra Nonpareil x Kg',r:'frutos',p:25000},
  {id:1127,n:'Arándanos Deshidratados x Kg',r:'deshidratados',p:18500},
  {id:1219,n:'Condimento para Arroz x 100 Gr',r:'especias',p:2900},
  {id:1101,n:'Corazones de Alcaucil x 330 Gr',r:'gourmet',p:8900},
  {id:1259,n:'Eneldo Semillas x 100 Gr',r:'semillas',p:2400},
  {id:2308,n:'Merkén Chileno x 100 Gr',r:'especias',p:3800},
  {id:1462,n:'Pasta de Aceitunas Cond. x 200 Gr',r:'gourmet',p:4840}
];
var rubroSel='todos';
var favs=JSON.parse(localStorage.getItem('test2_favs')||'[]');
var soloFavs=new URLSearchParams(location.search).get('fav')==='1';
var urlRubro=new URLSearchParams(location.search).get('rubro');
if(urlRubro && RUBROS.some(function(r){return r[0]===urlRubro;})) rubroSel=urlRubro;

function fmt(n){return n.toLocaleString('es-AR')}
function rubroDe(id){for(var i=0;i<RUBROS.length;i++)if(RUBROS[i][0]===id)return RUBROS[i];return ['','',''];}

function render(){
  var q=(document.getElementById('q').value||'').toLowerCase();
  var list=PRODS.slice().sort(function(a,b){return a.n.localeCompare(b.n,'es');});
  if(rubroSel!=='todos')list=list.filter(function(p){return p.r===rubroSel;});
  if(soloFavs)list=list.filter(function(p){return favs.indexOf(p.id)>=0;});
  if(q)list=list.filter(function(p){return p.n.toLowerCase().indexOf(q)>=0;});
  var out='',letra='';
  if(!list.length){
    out='<div class="p-empty">'+(soloFavs?'Todavía no marcaste favoritos.<br>Tocá el corazón ♡ de un producto y queda guardado acá.':'No hay productos de este rubro en la maqueta.<br><small>(en la versión real acá se cargan todos desde tu planilla)</small>')+'</div>';
  }else{
    out='<div class="pgrid">';
    var prevLetra='';
    // agrupar por letra inicial
    var conLetra=[];
    list.forEach(function(p){
      var L=p.n.charAt(0).toUpperCase();
      if(L!==prevLetra){conLetra.push({letra:L});prevLetra=L;}
      conLetra.push(p);
    });
    out='';
    var abierto=false;
    conLetra.forEach(function(x){
      if(x.letra){
        if(abierto)out+='</div>';
        out+='<div class="letter-row"><b>'+x.letra+'</b><i></i></div><div class="pgrid">';
        abierto=true;
      }else{
        var ru=rubroDe(x.r);
        var esFav=favs.indexOf(x.id)>=0;
        out+='<div class="pc">'
          +'<div class="pc-imgw"><img src="'+CLOUD+x.id+'" alt="" loading="lazy">'
          +'<button class="pc-fav'+(esFav?' on':'')+'" onclick="togFav('+x.id+',this)" aria-label="Favorito"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 5.6a5.4 5.4 0 0 0-7.7 0L12 6.7l-1.1-1.1a5.4 5.4 0 1 0-7.7 7.7L12 22l8.8-8.7a5.4 5.4 0 0 0 0-7.7z"/></svg></button></div>'
          +'<div class="pc-body"><span class="pc-rubro">'+ru[2]+' '+ru[1]+'</span>'
          +'<div class="pc-name">'+x.n+'</div>'
          +'<div class="pc-price">$'+fmt(x.p)+'</div>'
          +'<button class="pc-add">🛒 Agregar al pedido</button></div></div>';
      }
    });
    if(abierto)out+='</div>';
  }
  document.getElementById('lista').innerHTML=out;
}
function togFav(id,btn){
  var i=favs.indexOf(id);
  if(i>=0)favs.splice(i,1);else favs.push(id);
  localStorage.setItem('test2_favs',JSON.stringify(favs));
  btn.classList.toggle('on');
  if(soloFavs)render();
}
// ── bottom-sheet de rubros ──
function buildSheet(){
  var h='<button class="sh-r'+(rubroSel==='todos'?' act':'')+'" onclick="selRubro(\'todos\')"><span class="em">🧺</span><span>Todos</span></button>';
  RUBROS.forEach(function(r){
    h+='<button class="sh-r'+(rubroSel===r[0]?' act':'')+'" onclick="selRubro(\''+r[0]+'\')"><span class="em">'+r[2]+'</span><span>'+r[1]+'</span></button>';
  });
  document.getElementById('sheetGrid').innerHTML=h;
}
function openSheet(){buildSheet();document.getElementById('sheetOv').classList.add('on');document.getElementById('sheet').classList.add('on');document.body.style.overflow='hidden';}
function closeSheet(){document.getElementById('sheetOv').classList.remove('on');document.getElementById('sheet').classList.remove('on');document.body.style.overflow='';}
function selRubro(id){
  rubroSel=id;
  var r=id==='todos'?['','Todos','🧺']:rubroDe(id);
  document.getElementById('rubroEm').textContent=r[2];
  document.getElementById('rubroLbl').textContent=r[1];
  closeSheet();render();
}
if(rubroSel!=='todos')selRubro(rubroSel);else render();
</script>
</body>
</html>
